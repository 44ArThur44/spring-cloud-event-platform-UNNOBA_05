version: '3.9'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - 5432:5432

  rabbitmq:
    image: rabbitmq:3.11-management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - 5672:5672
      - 15672:15672

  config-server:
    build: ./config-server
    ports:
      - 8888:8888
    volumes:
      - ./config-repo:/config-repo

  eureka-server:
    build: ./eureka-server
    depends_on:
      - config-server
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - 8761:8761

  api-gateway:
    build: ./api-gateway
    depends_on:
      - eureka-server
      - config-server
    ports:
      - 8080:8080

  user-service:
    build: ./user-service
    depends_on:
      - eureka-server
      - config-server
      - postgres
    ports:
      - 8101:8101

  catalog-service:
    build: ./catalog-service
    depends_on:
      - eureka-server
      - config-server
      - postgres
      - user-service
      - rabbitmq
    ports:
      - 8102:8102

  notification-service:
    build: ./notification-service
    depends_on:
      - eureka-server
      - config-server
      - rabbitmq
    ports:
      - 8103:8103

volumes:
  postgres-data:
